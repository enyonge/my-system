<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이동형 콘텐츠 제작 시스템 관리 시스템</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --available: #27ae60;
            --busy: #e74c3c;
            --bg: #f4f7f6;
            --admin-color: #8e44ad;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; position: relative; }
        
        .admin-login-btn { position: absolute; right: 0; top: 0; padding: 5px 12px; font-size: 12px; background: #ddd; border-radius: 5px; cursor: pointer; border: none; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; color: white; font-weight: bold; margin-top: 10px; font-size: 0.8em; }
        .status-on { background: var(--available); }
        .status-off { background: var(--busy); }

        .form-section, .admin-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .admin-section { border: 2px solid var(--admin-color); display: none; }
        .admin-section.active { display: block; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        label { font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 8px; color: var(--primary); }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        /* 시간 선택 박스 */
        .selection-box { 
            background: #f9f9f9; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px;
        }
        .time-item { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 14px; 
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
        }
        .time-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin: 0; }
        
        /* 직접 입력 시간창 */
        .custom-time-row { grid-column: span 2; display: flex; align-items: center; gap: 10px; margin-top: 5px; padding-top: 10px; border-top: 1px dashed #ccc; }

        .date-tag { background: var(--accent); color: white; padding: 2px 10px; border-radius: 15px; font-size: 12px; display: inline-flex; align-items: center; margin-right: 5px; margin-top: 5px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-submit { width: 100%; background: var(--primary); color: white; margin-top: 20px; font-size: 16px; }
        .btn-excel { background: var(--available); color: white; flex: 2; }
        .btn-clear { background: var(--busy); color: white; flex: 1; }
        .btn-logout { background: #666; color: white; flex: 1; }

        .history { margin-top: 40px; overflow-x: auto; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 15px; overflow: hidden; min-width: 900px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎥 이동형 콘텐츠 제작 시스템 관리</h1>
        <button id="adminBtn" class="admin-login-btn" onclick="toggleAdmin()">🔒 관리자 모드</button>
    </header>

    <div id="adminSection" class="admin-section">
        <h3 style="color: var(--admin-color);">👑 관리자 메뉴</h3>
        <div class="btn-group">
            <button class="btn-excel" onclick="downloadCSV()">📊 엑셀(CSV) 다운로드</button>
            <button class="btn-clear" onclick="clearData()">⚠️ 데이터 전체 삭제</button>
            <button class="btn-logout" onclick="logoutAdmin()">로그아웃</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>시스템 #1 (163)</h3>
            <div id="status-163" class="status-badge status-on">사용 가능</div>
        </div>
        <div class="card">
            <h3>시스템 #2 (164)</h3>
            <div id="status-164" class="status-badge status-on">사용 가능</div>
        </div>
    </div>

    <div class="form-section">
        <h3>🚀 사용 신청서 작성</h3>
        <div class="form-grid">
            <div>
                <label>장비 선택</label>
                <select id="deviceId">
                    <option value="163">시스템 #1 (163번)</option>
                    <option value="164">시스템 #2 (164번)</option>
                </select>
            </div>
            <div><label>신청자 성함</label><input type="text" id="userName"></div>
            <div><label>사번</label><input type="text" id="userNo"></div>
            <div>
                <label>활용 일자 추가</label>
                <div style="display:flex; gap:5px;"><input type="date" id="dateInput"><button type="button" onclick="addDate()" style="flex:none; background:#666; color:#fff; padding:5px 10px; border:none; border-radius:5px;">추가</button></div>
                <div id="selectedDateList"></div>
            </div>
            <div class="full-width">
                <label>활용 시간 (중복 선택)</label>
                <div id="timeOptions" class="selection-box"></div>
            </div>
            <div class="full-width">
                <label>사용 장소</label>
                <select id="locationSelect" onchange="toggleInp('locationSelect', 'customLocation')">
                    <option value="사회과학관 식품조리실(3321)">사회과학관 식품조리실(3321)</option>
                    <option value="사회과학관 식품화학미생물실험실(3217)">사회과학관 식품화학미생물실험실(3217)</option>
                    <option value="사회과학관 강의실(3216)">사회과학관 강의실(3216)</option>
                    <option value="사회과학관 EMR실습실(3315)">사회과학관 EMR실습실(3315)</option>
                    <option value="쉐턱관 작업치료평가실습실(1102)">쉐턱관 작업치료평가실습실(1102)</option>
                    <option value="쉐턱관 디지털 헬스케어 융합실습센터(1411)">쉐턱관 디지털 헬스케어 융합실습센터(1411)</option>
                    <option value="직접입력">-- 직접 입력(추가) --</option>
                </select>
                <input type="text" id="customLocation" placeholder="장소 입력" style="margin-top:5px; display:none;">
            </div>
            <div class="full-width">
                <label>활용 교과목</label>
                <select id="subjectSelect" onchange="toggleInp('subjectSelect', 'customSubject')">
                    <option value="기능성펫푸드실무">기능성펫푸드실무</option>
                    <option value="펫푸드식사요법실무">펫푸드식사요법실무</option>
                    <option value="펫푸드위생학">펫푸드위생학</option>
                    <option value="반려동물생리학">반려동물생리학</option>
                    <option value="생리학">생리학</option>
                    <option value="의학용어">의학용어</option>
                    <option value="말과학">말과학</option>
                    <option value="직접입력">-- 직접 입력(추가) --</option>
                </select>
                <input type="text" id="customSubject" placeholder="교과목 입력" style="margin-top:5px; display:none;">
            </div>
        </div>
        <button id="submitBtn" class="btn-submit" onclick="submitRequest()">📝 신청 완료</button>
    </div>

    <div class="history">
        <h3>📅 전체 운영 현황</h3>
        <table>
            <thead>
                <tr>
                    <th>장비</th>
                    <th>신청자(사번)</th>
                    <th>날짜</th>
                    <th>시간</th>
                    <th>장소</th>
                    <th>교과목</th>
                    <th>상태</th>
                    <th class="admin-only" style="display:none;">관리</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ 여기에 구글 앱스 스크립트 배포 URL을 복사해서 붙여넣으세요!
    const SCRIPT_URL = "여기에_구글_스크립트_URL을_입력하세요";

    const ADMIN_PW = "7365"; 
    let isAdmin = false;
    let db = []; // 데이터는 시트에서 불러오거나 로컬에서 관리

    // 시간 생성 (9:00 ~ 19:00)
    const timeOptions = document.getElementById('timeOptions');
    for (let i = 9; i < 19; i++) {
        const timeLabel = `${i}:00 ~ ${i+1}:00`;
        timeOptions.innerHTML += `<label class="time-item"><input type="checkbox" name="useTime" value="${timeLabel}"><span>${timeLabel}</span></label>`;
    }
    timeOptions.innerHTML += `
        <div class="custom-time-row">
            <label class="time-item" style="flex:none;"><input type="checkbox" id="customTimeCheck"><span style="font-weight:bold; color:var(--accent);">직접 입력:</span></label>
            <input type="text" id="customTimeInput" placeholder="예: 08:30~10:00" style="padding:5px 10px; font-size:13px;">
        </div>
    `;

    let selectedDates = [];
    function addDate() {
        const d = document.getElementById('dateInput').value;
        if(d && !selectedDates.includes(d)) { selectedDates.push(d); renderTags(); }
        document.getElementById('dateInput').value = '';
    }
    function renderTags() {
        document.getElementById('selectedDateList').innerHTML = selectedDates.map(d => `<span class="date-tag">${d} <b onclick="selectedDates=selectedDates.filter(x=>x!=='${d}');renderTags()" style="cursor:pointer">×</b></span>`).join('');
    }

    function toggleInp(s, i) { document.getElementById(i).style.display = (document.getElementById(s).value === '직접입력') ? 'block' : 'none'; }

    // 관리자 로그인/로그아웃
    function toggleAdmin() {
        if (!isAdmin) {
            if (prompt("관리자 비밀번호를 입력하세요.") === ADMIN_PW) {
                isAdmin = true;
                document.getElementById('adminSection').classList.add('active');
                document.getElementById('adminBtn').innerText = "🔓 관리 중";
                render();
            } else { alert("비밀번호가 틀렸습니다."); }
        } else { logoutAdmin(); }
    }
    function logoutAdmin() {
        isAdmin = false;
        document.getElementById('adminSection').classList.remove('active');
        document.getElementById('adminBtn').innerText = "🔒 관리자 모드";
        render();
    }

    // 화면 렌더링
    function render() {
        const body = document.getElementById('historyBody');
        const statusMap = { '163': '사용 가능', '164': '사용 가능' };
        const today = new Date().toISOString().split('T')[0];
        body.innerHTML = '';

        document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'table-cell' : 'none');

        db.slice().reverse().forEach((item, idx) => {
            const realIdx = db.length - 1 - idx;
            if (item.active && item.date === today) statusMap[item.id] = '사용 중';
            body.innerHTML += `
                <tr>
                    <td><b>${item.id}호</b></td>
                    <td>${item.name}(${item.no})</td>
                    <td>${item.date}</td>
                    <td><small>${item.times.join('<br>')}</small></td>
                    <td>${item.loc}</td>
                    <td>${item.subject}</td>
                    <td>${item.active ? '<span style="color:#e67e22;font-weight:bold;">예약중</span>' : '반납됨'}</td>
                    <td class="admin-only" style="display:${isAdmin?'table-cell':'none'}">
                        ${item.active ? `<button onclick="returnItem(${realIdx})" style="font-size:11px; background:#e74c3c; color:white; border:none; border-radius:3px; padding:3px 7px; cursor:pointer;">반납</button>` : '-'}
                    </td>
                </tr>`;
        });

        ['163', '164'].forEach(id => {
            const el = document.getElementById('status-' + id);
            el.innerText = statusMap[id];
            el.className = `status-badge ${statusMap[id] === '사용 중' ? 'status-off' : 'status-on'}`;
        });
        localStorage.setItem('m_system_final_v7', JSON.stringify(db));
    }

    // 🚀 신청하기 (시트 연동)
    async function submitRequest() {
        const name = document.getElementById('userName').value;
        const no = document.getElementById('userNo').value;
        const times = Array.from(document.querySelectorAll('input[name="useTime"]:checked')).map(c => c.value);
        if(document.getElementById('customTimeCheck').checked) {
            const customVal = document.getElementById('customTimeInput').value;
            if(customVal) times.push("(직접)" + customVal);
        }
        const loc = document.getElementById('locationSelect').value === '직접입력' ? document.getElementById('customLocation').value : document.getElementById('locationSelect').value;
        const sub = document.getElementById('subjectSelect').value === '직접입력' ? document.getElementById('customSubject').value : document.getElementById('subjectSelect').value;

        if(!name || !no || selectedDates.length === 0 || times.length === 0 || !loc || !sub) return alert('모든 정보를 입력하세요.');

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "⏳ 전송 중...";
        submitBtn.disabled = true;

        // 각 날짜별로 데이터 생성 및 저장
        for (const date of selectedDates) {
            const payload = { id: document.getElementById('deviceId').value, name, no, date, times, loc, subject: sub, active: true };
            
            // 시트 전송 (URL이 있는 경우만)
            if(SCRIPT_URL.startsWith("http")) {
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                } catch(e) { console.error("시트 전송 실패", e); }
            }
            db.push(payload);
        }

        alert('신청이 완료되었습니다! (구글 시트 동기화 완료)');
        location.reload(); 
    }

    // 시트에서 데이터 불러오기
    async function loadData() {
        if(SCRIPT_URL.startsWith("http")) {
            try {
                const res = await fetch(SCRIPT_URL);
                const cloudData = await res.json();
                if(cloudData && cloudData.length > 0) db = cloudData;
            } catch(e) { 
                console.log("로컬 데이터를 사용합니다."); 
                db = JSON.parse(localStorage.getItem('m_system_final_v7')) || [];
            }
        } else {
            db = JSON.parse(localStorage.getItem('m_system_final_v7')) || [];
        }
        render();
    }

    function returnItem(i) { if(confirm('반납 처리하시겠습니까?')) { db[i].active = false; render(); } }
    function downloadCSV() { /* 기존과 동일 */ }
    function clearData() { if(confirm('전체 삭제하시겠습니까?')) { db=[]; render(); } }

    loadData();
</script>
</body>
</html>
